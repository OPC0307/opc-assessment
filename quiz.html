<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>测评答题 — OPC一人公司适配度测评</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="quiz">
  <div class="page">
    <div class="page-content">

      <!-- Brand Header -->
      <div class="brand-header">
        <div class="brand-header__logo">OPC 一人公司适配度测评</div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-bar__fill"></div>
        </div>
        <div class="progress-text">
          <span>已完成 <span class="progress-current">0</span> / <span class="progress-total">15</span> 题</span>
          <span>约3分钟</span>
        </div>
      </div>

      <!-- Question Card -->
      <div class="card question-card anim-fade-in-up">
        <div class="question-num">第 1 题</div>
        <div class="question-dim">核心禀赋</div>
        <div class="question-text">题目加载中...</div>
        <div class="question-hint">加载题目提示...</div>
        <div class="options-wrap"></div>
      </div>

      <!-- Feedback Modal Container -->
      <div id="fb-feedback" style="display:none;"></div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
