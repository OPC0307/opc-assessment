<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2340"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a853" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4a853" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d4a853" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle geometric decoration -->
  <circle cx="1100" cy="80" r="120" fill="#d4a853" opacity="0.04"/>
  <circle cx="100" cy="600" r="200" fill="#d4a853" opacity="0.03"/>
  <rect x="0" y="180" width="1200" height="1" fill="url(#accentLine)" opacity="0.3"/>
  <rect x="0" y="575" width="1200" height="1" fill="url(#accentLine)" opacity="0.4"/>

  <!-- Corner accents -->
  <rect x="50" y="50" width="40" height="2" rx="1" fill="#d4a853" opacity="0.4"/>
  <rect x="50" y="50" width="2" height="40" rx="1" fill="#d4a853" opacity="0.4"/>
  <rect x="1110" y="585" width="40" height="2" rx="1" fill="#d4a853" opacity="0.4"/>
  <rect x="1148" y="585" width="2" height="40" rx="1" fill="#d4a853" opacity="0.4"/>

  <!-- Category badge -->
  <rect x="80" y="80" width="130" height="36" rx="18" fill="#d4a853" opacity="0.15"/>
  <rect x="80" y="80" width="130" height="36" rx="18" fill="none" stroke="#d4a853" stroke-width="1" opacity="0.4"/>
  <text x="145" y="103" text-anchor="middle" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-weight="600" font-size="15" fill="#d4a853">💰 补贴攻略</text>

  <!-- Title -->
  <text x="600" y="360" text-anchor="middle" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-weight="700" font-size="42" fill="#ffffff" letter-spacing="1">为什么深圳的补贴最多？</text>

  <!-- Date + brand -->
  <text x="600" y="476" text-anchor="middle" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-weight="400" font-size="18" fill="#8899aa">2026年5月13日</text>

  <!-- Bottom brand bar -->
  <rect x="0" y="611" width="1200" height="64" fill="#0a1a2e" opacity="0.6"/>
  <text x="80" y="647" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-weight="600" font-size="16" fill="#d4a853" opacity="0.8">OPC 一人公司孵化器</text>
  <text x="1120" y="647" text-anchor="end" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-weight="400" font-size="14" fill="#667788">fhopc.top</text>
</svg>