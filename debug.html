<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OPC 调试面板</title>
  <style>
    :root {
      --primary: #1a365d;
      --accent: #d4a853;
      --bg: #f5f0e8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Noto Serif SC", "Source Han Serif SC", serif;
      background: var(--bg);
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .panel {
      background: #fff; border-radius: 12px;
      padding: 32px; max-width: 400px; width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      text-align: center;
    }
    h1 { font-size: 1.2rem; margin-bottom: 6px; font-weight: 700; }
    p { font-size: 0.85rem; color: #666; margin-bottom: 24px; }
    .btn {
      display: block; width: 100%; padding: 14px 20px;
      margin-bottom: 10px; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #2a4a7f; }
    .btn-accent { background: var(--accent); color: var(--primary); }
    .btn-accent:hover { background: #e8c97a; }
    .btn-outline {
      background: transparent; border: 1px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover { background: rgba(26,54,93,0.06); }
    .tip { font-size: 0.75rem; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>OPC 测评调试面板</h1>
    <p>跳过答题，直接预览报告页面</p>
    <button class="btn btn-primary" data-target="report-free.html">免费版报告</button>
    <button class="btn btn-accent" data-target="report-paid.html">付费完整版报告</button>
    <button class="btn btn-outline" data-target="pay.html">支付页面</button>
    <button class="btn btn-outline" data-target="quiz.html">答题页面</button>
    <button class="btn btn-outline" id="btn-stats">查看统计数据</button>
    <div id="stats-panel" style="display:none;margin-top:16px;text-align:left;background:rgba(26,54,93,0.04);border-radius:8px;padding:16px;font-size:0.8125rem;"></div>
    <div class="tip">点击后自动注入模拟数据，无需真实答题</div>
  </div>
  <script>
    document.querySelectorAll(".btn[data-target]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        localStorage.setItem("opc_debug", "1");
        window.location.href = this.getAttribute("data-target");
      });
    });
    document.getElementById("btn-stats").addEventListener("click", function() {
      var panel = document.getElementById("stats-panel");
      if (panel.style.display !== "none") { panel.style.display = "none"; return; }
      panel.style.display = "block";
      // 触发统计脚本
      panel.innerHTML = "正在加载统计...";
      var script = document.createElement("script");
      script.src = "app.js";
      script.onload = function() {
        var summary = getStatsSummary();
        if (!summary) { panel.innerHTML = "<p>暂无统计数据。请先通过答题或预览报告产生数据。</p>"; return; }
        var html = "<h3 style='margin-bottom:8px;font-size:0.9375rem;color:var(--primary);'>数据统计</h3>";
        html += "<table style='width:100%;border-collapse:collapse;'>";
        html += "<tr><td style='padding:4px 0;color:var(--text-muted)'>答题完成</td><td style='text-align:right;font-weight:700'>" + summary.quizCompletes + "</td></tr>";
        html += "<tr><td style='padding:4px 0;color:var(--text-muted)'>免费报告浏览</td><td style='text-align:right;font-weight:700'>" + summary.freeReportViews + "</td></tr>";
        html += "<tr><td style='padding:4px 0;color:var(--text-muted)'>支付页浏览</td><td style='text-align:right;font-weight:700'>" + summary.payPageViews + "</td></tr>";
        html += "<tr><td style='padding:4px 0;color:var(--text-muted)'>支付完成</td><td style='text-align:right;font-weight:700'>" + summary.payCompletes + "</td></tr>";
        html += "<tr><td style='padding:4px 0;color:var(--text-muted)'>付费报告浏览</td><td style='text-align:right;font-weight:700'>" + summary.paidReportViews + "</td></tr>";
        html += "<tr><td style='padding:4px 0;color:var(--text-muted)'>分享点击</td><td style='text-align:right;font-weight:700'>" + summary.shareClicks + "</td></tr>";
        html += "<tr><td style='padding:4px 0;color:var(--text-muted)'>「我要定制」点击</td><td style='text-align:right;font-weight:700'>" + summary.trackClicks + "</td></tr>";
        html += "<tr><td style='padding:4px 0;color:var(--text-muted)'>总事件数</td><td style='text-align:right;font-weight:700'>" + summary.totalEvents + "</td></tr>";
        html += "</table>";
        panel.innerHTML = html;
      };
      script.onerror = function() { panel.innerHTML = "<p>统计功能需在报告页面浏览后产生数据。</p>"; };
    });
  </script>
</body>
</html>
