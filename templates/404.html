<!DOCTYPE html>
<html lang="{{#if zh}}zh-CN{{/if}}{{#if en}}en{{/if}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{t.404.title}}</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="{{t.404.canonical}}">
  <link rel="icon" type="image/svg+xml" href="{{#if zh}}favicon.svg{{/if}}{{#if en}}/favicon.svg{{/if}}">
  <link rel="stylesheet" href="{{#if zh}}style.css{{/if}}{{#if en}}/style.css{{/if}}">
</head>
<body data-page="404">

<nav class="site-nav" id="site-nav">
  <div class="site-nav__inner">
    <a href="{{t.nav.brand_url}}" class="site-nav__brand">OPC</a>
    <div class="site-nav__links">
      <a href="{{t.nav.quiz_url}}">{{t.nav.quiz}}</a>
      <a href="{{t.nav.subsidy_url}}">{{t.nav.subsidy}}</a>
      <a href="{{t.nav.services_url}}">{{t.nav.services}}</a>
      <a href="{{t.nav.blog_url}}">{{t.nav.blog}}</a>
      <a href="{{t.nav.about_url}}">{{t.nav.about}}</a>
    </div>
    <a href="{{t.404.lang_switch_url}}" class="lang-toggle">{{t.404.lang_toggle}}</a>
  </div>
</nav>

<section class="fw-hero" style="padding:120px 32px 80px;text-align:center;">
  <div class="fw-inner">
    <div style="font-size:6rem;font-weight:300;color:#1d1d1f;line-height:1;margin-bottom:16px;">{{t.404.code}}</div>
    <h1 class="fw-hero__title" style="font-size:1.5rem;">{{t.404.heading}}</h1>
    <p class="fw-hero__sub" style="margin-bottom:32px;">{{t.404.sub}}</p>
    <a href="{{t.404.home_url}}" style="display:inline-block;background:#1d1d1f;color:#fff;padding:12px 28px;border-radius:4px;text-decoration:none;font-size:0.9375rem;font-weight:600;">{{t.404.home_link}}</a>
  </div>
</section>

<footer class="fw-footer">
  <div class="fw-inner">
    {{t.footer.brand}} <span class="fw-footer__sep">|</span> fhopc.top
  </div>
</footer>

<script src="{{#if zh}}app-core.js{{/if}}{{#if en}}/app-core.js{{/if}}"></script>
</body>
</html>
