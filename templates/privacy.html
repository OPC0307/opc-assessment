<!DOCTYPE html>
<html lang="{{#if zh}}zh-CN{{/if}}{{#if en}}en{{/if}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{t.privacy.title}}</title>
  <meta name="description" content="{{t.privacy.meta_desc}}">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="{{t.privacy.canonical}}">
  <meta property="og:title" content="{{t.privacy.og_title}}">
  <meta property="og:description" content="{{t.privacy.og_desc}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{t.privacy.og_url}}">
  <link rel="icon" type="image/svg+xml" href="{{#if zh}}favicon.svg{{/if}}{{#if en}}/favicon.svg{{/if}}">
  <link rel="stylesheet" href="{{#if zh}}style.css{{/if}}{{#if en}}/style.css{{/if}}">
</head>
<body data-page="privacy">

<nav class="site-nav" id="site-nav">
  <div class="site-nav__inner">
    <a href="{{t.nav.brand_url}}" class="site-nav__brand">OPC</a>
    <div class="site-nav__links">
      <a href="{{t.nav.quiz_url}}">{{t.nav.quiz}}</a>
      <a href="{{t.nav.subsidy_url}}">{{t.nav.subsidy}}</a>
      <a href="{{t.nav.services_url}}">{{t.nav.services}}</a>
      <a href="{{t.nav.blog_url}}">{{t.nav.blog}}</a>
      <a href="{{t.nav.about_url}}">{{t.nav.about}}</a>
    </div>
    <a href="{{t.privacy.lang_switch_url}}" class="lang-toggle">{{t.privacy.lang_toggle}}</a>
  </div>
</nav>

<section class="fw-hero" style="padding:100px 32px 80px;">
  <div class="fw-inner">
    <h1 class="fw-hero__title" style="font-size:clamp(2.5rem,5vw,3.5rem);">{{t.privacy.hero_title}}</h1>
    <p class="fw-hero__sub">{{t.privacy.hero_sub}}</p>
  </div>
</section>

<section class="fw-section">
  <div class="fw-inner" style="max-width:720px;">
    <div style="font-size:0.9375rem;color:#6e6e73;line-height:1.8;">
      {{t.privacy.content}}
    </div>
  </div>
</section>

<footer class="fw-footer">
  <div class="fw-inner">
    {{t.footer.brand}} <span class="fw-footer__sep">|</span> fhopc.top <span class="fw-footer__sep">|</span> <a href="{{t.footer.home_url}}">{{t.footer.home}}</a> <span class="fw-footer__sep">|</span> <a href="{{t.footer.privacy_url}}">{{t.footer.privacy}}</a>
  </div>
</footer>

<script src="{{#if zh}}app-core.js{{/if}}{{#if en}}/app-core.js{{/if}}"></script>
</body>
</html>
