<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>开始评估 — OPC一人公司适配度测评</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="profile">
  <div class="page">
    <div class="page-content">

      <!-- Brand Header -->
      <div class="brand-header anim-fade-in-up">
        <div class="brand-header__logo">OPC 一人公司孵化器</div>
        <div class="brand-header__tagline">专业评估工具</div>
      </div>

      <!-- Title -->
      <div class="anim-fade-in-up anim-delay-1">
        <h2 class="section-title">先简单认识一下</h2>
        <p class="section-subtitle">5个基础信息，帮助更精准地匹配你的测评题目</p>
      </div>

      <!-- Profile Form -->
      <div class="card anim-fade-in-up anim-delay-2">
        <div class="form-group">
          <label class="form-label" for="pf-age">年龄段</label>
          <select id="pf-age" class="form-select">
            <option value="">请选择</option>
            <option value="18-22">18-22 岁</option>
            <option value="23-27">23-27 岁</option>
            <option value="28-35">28-35 岁</option>
            <option value="36-45">36-45 岁</option>
            <option value="46+">46 岁及以上</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="pf-gender">性别</label>
          <select id="pf-gender" class="form-select">
            <option value="">请选择</option>
            <option value="male">男</option>
            <option value="female">女</option>
            <option value="other">其他</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="pf-occupation">当前身份</label>
          <select id="pf-occupation" class="form-select">
            <option value="">请选择</option>
            <option value="在职员工">在职员工</option>
            <option value="自由职业">自由职业</option>
            <option value="创业者">创业者</option>
            <option value="个体经营者">个体经营者</option>
            <option value="学生">学生</option>
            <option value="待业/转行中">待业转行</option>
            <option value="全职主理人">全职主理人</option>
            <option value="其他">其他</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="pf-edu">最高学历</label>
          <select id="pf-edu" class="form-select">
            <option value="">请选择</option>
            <option value="高中及以下">高中及以下</option>
            <option value="大专">大专</option>
            <option value="本科">本科</option>
            <option value="硕士及以上">硕士及以上</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="pf-channel">来源渠道</label>
          <select id="pf-channel" class="form-select">
            <option value="">请选择</option>
            <option value="小红书">小红书</option>
            <option value="微信私域">微信私域</option>
            <option value="公众号">公众号</option>
            <option value="视频号抖音">视频号/抖音</option>
            <option value="朋友推荐">朋友推荐</option>
            <option value="搜索平台">搜索平台</option>
            <option value="其他">其他</option>
          </select>
        </div>
      </div>

      <!-- Submit -->
      <div class="anim-fade-in-up anim-delay-3" style="margin-top:8px;">
        <button id="pf-submit" class="btn btn-accent btn-block btn-lg">开始答题</button>
      </div>

      <!-- Footer -->
      <div class="footer" style="margin-top:32px;">
        <div>信息仅用于题目匹配，不会存储或分享</div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
