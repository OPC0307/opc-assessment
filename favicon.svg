<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2340"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#d4a853" stroke-width="1.5" opacity="0.6"/>
  <!-- Geometric accent ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#d4a853" stroke-width="0.75" opacity="0.25" stroke-dasharray="8 4"/>
  <!-- OPC text -->
  <text x="32" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="18" fill="#d4a853" letter-spacing="2">OPC</text>
  <!-- Geometric dot accent -->
  <circle cx="48" cy="18" r="3" fill="#e8c97a" opacity="0.8"/>
</svg>
